name: Full Stack CI
run-name: ${{github.actor}} triggered CI pipeline 
on: [push]

jobs:
  Build-And-Test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: docker compose build and create
      run: docker compose up -d --build
  
    - name: Run tests
      run: docker compose exec backend cargo test

    - name: Tear down
      if: always()
      run: docker compose down
    




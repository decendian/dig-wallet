version: '3.8'

services:
  # Backend API Server
  api_server:
    build:
      context: ./crates
      dockerfile: Dockerfile
    container_name: dig-security-api
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8080
      - DID_REGISTRY_PATH=/did_library/resources/did_registry.json
    volumes:
      - did_registry_data:/did_library/resources
    restart: unless-stopped
    networks:
      - dig_security_network

  # Frontend Web App
  web_app:
    build:
      context: ./frontend/web_app
      dockerfile: Dockerfile
    container_name: dig-security-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
      - NODE_ENV=development
    depends_on:
      - api_server
    restart: unless-stopped
    networks:
      - dig_security_network

volumes:
  did_registry_data:
    name: did_registry_data

networks:
  dig_security_network:
    name: dig_security_network
    driver: bridge